<!DOCTYPE html>
<html lang="sk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peltier Control – Prihlásenie</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="dark"] {
            --bg:          #111318;
            --bg-card:     #1a1d26;
            --bg-input:    #0f1117;
            --border:      #25283a;
            --text:        #e8e8f0;
            --text-muted:  #6b6f85;
            --text-label:  #9196b0;
            --accent-blue: #4f9cf9;
            --accent-red:  #f43f5e;
        }

        :root[data-theme="light"] {
            --bg:          #f4f5f9;
            --bg-card:     #ffffff;
            --bg-input:    #f0f1f6;
            --border:      #e2e4ee;
            --text:        #1a1d2e;
            --text-muted:  #9196b0;
            --text-label:  #6b6f85;
            --accent-blue: #2563eb;
            --accent-red:  #e11d48;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 40px 36px;
            width: 100%;
            max-width: 400px;
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .login-logo .logo {
            width: 40px; height: 40px;
            background: var(--accent-blue);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }

        .login-logo h1 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
        }

        .login-logo h1 span {
            display: block;
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-label);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            padding: 11px 14px;
            font-size: 0.95rem;
            transition: border 0.2s;
            width: 100%;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: var(--accent-blue);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
            font-family: inherit;
        }

        .btn-login:hover { opacity: 0.88; }

        .error-msg {
            background: color-mix(in srgb, var(--accent-red) 12%, transparent);
            border: 1px solid color-mix(in srgb, var(--accent-red) 30%, transparent);
            color: var(--accent-red);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.83rem;
            margin-bottom: 16px;
        }

        .role-info {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .role-info p {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .role-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .role-badge {
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 600;
            border: 1px solid;
            min-width: 90px;
            text-align: center;
        }

        .role-badge.operator {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background: color-mix(in srgb, var(--accent-blue) 10%, transparent);
        }

        .role-badge.spektator {
            border-color: #a78bfa;
            color: #a78bfa;
            background: color-mix(in srgb, #a78bfa 10%, transparent);
        }

        .role-desc {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .theme-toggle {
            position: fixed;
            top: 20px; right: 20px;
            width: 36px; height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">
    <span id="theme-icon">☀</span>
</button>

<div class="login-card">

    <div class="login-logo">
        <div class="logo">❄</div>
        <h1>
            Peltier Control
            <span>IoT Dashboard – Prihlásenie</span>
        </h1>
    </div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
        <div class="form-group">
            <label>Používateľské meno</label>
            <input type="text" name="username" placeholder="operator / spektator"
                   autocomplete="username" required>
        </div>
        <div class="form-group">
            <label>Heslo</label>
            <input type="password" name="password" placeholder="••••••••"
                   autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-login">Prihlásiť sa</button>
    </form>

    <div class="role-info">
        <p>Dostupné roly</p>
        <div class="role-row">
            <span class="role-badge operator">⚙ Operátor</span>
            <span class="role-desc">Plný prístup – ovládanie a regulácia</span>
        </div>
        <div class="role-row">
            <span class="role-badge spektator">👁 Spektátor</span>
            <span class="role-desc">Iba sledovanie – bez ovládania</span>
        </div>
    </div>

</div>

<script>
    function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.getAttribute('data-theme') === 'dark';
        html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('theme-icon').innerText = isDark ? '🌙' : '☀';
    }
</script>

</body>
</html>
